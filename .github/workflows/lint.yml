# What is the gole of work flow - 
# Goal- whenever the somer one changes the code the liner will check if the sytax, formate, 
# intentation is correct or not 

name: Auto linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    # this step will autometiclyy cloan the code from current code from current repo current branch
    steps:
      - name: Checkout/clone the code
        uses: actions/checkout@v7
# this stap will install the linting tool 
      - name: install linter
        run: pip install ruff
